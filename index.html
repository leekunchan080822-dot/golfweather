   0) 版本設定（可調）
========================= */

  const d=new Date(dateStr);
  return ["週日","週一","週二","週三","週四","週五","週六"][d.getDay()];
}

/* =========================
   3) 天氣：Open-Meteo ECMWF
========================= */
async function getWeeklyWeather(lat, lon){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,apparent_temperature,precipitation_probability,precipitation,windspeed_10m,windgusts_10m&daily=temperature_2m_max,temperature_2m_min&forecast_days=7&timezone=Asia/Taipei`;

  try{
    const res = await fetch(url);
    const data = await res.json();
    if(!data || !data.hourly || !data.daily) return { error:true };

    const hourly = data.hourly;
    const daily = data.daily;
    const results = [];

    for(let d=0; d<7; d++){
      const date = daily.time[d];
      const morning = [];
      const afternoon = [];
      const day0818 = [];

      hourly.time.forEach((t,i)=>{
        if(t.startsWith(date)){
          const h = parseInt(t.substring(11,13));
          if(h>=8 && h<12) morning.push(i);
          if(h>=12 && h<18) afternoon.push(i);
          if(h>=8 && h<18) day0818.push(i);
        }
      });

      const avg=(arr,key)=>
        arr.length ? Math.round(arr.reduce((s,i)=>s+hourly[key][i],0)/arr.length) : 0;

      results.push({
        date,
        weekday:getWeekday(date),
        minT: Math.round(daily.temperature_2m_min[d]*10)/10,
        maxT: Math.round(daily.temperature_2m_max[d]*10)/10,
        feel0818: avg(day0818,"apparent_temperature"),

        popMorning: avg(morning,"precipitation_probability"),
        popAfternoon: avg(afternoon,"precipitation_probability"),

        rainMorning: avg(morning,"precipitation"),
        rainAfternoon: avg(afternoon,"precipitation"),

        windMorning: avg(morning,"windspeed_10m"),
        windAfternoon: avg(afternoon,"windspeed_10m"),

        gustMorning: avg(morning,"windgusts_10m"),
        gustAfternoon: avg(afternoon,"windgusts_10m")
      });
    }

    return { forecasts: results };
  }catch(e){
    console.log(e);
    return { error:true };
  }
}

/* =========================
   4) 地址：OSM Nominatim 反查（免費/免綁卡）
   - 做快取避免一直查
========================= */
const addressCache = {}; // key = "lat,lon" => address string

async function reverseGeocode(lat, lon){
  const key = `${lat},${lon}`;
  if(addressCache[key]) return addressCache[key];

  const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}&accept-language=zh-TW`;

  try{
    const res = await fetch(url, {
      headers: {
        // Nominatim 建議帶 user-agent，但瀏覽器無法自訂 UA；這裡至少加 Referer 讓請求更「像人」
        "Accept": "application/json"
      }
    });
    const data = await res.json();
    const addr = (data && (data.display_name || (data.address && Object.values(data.address).join(" ")))) ? (data.display_name || Object.values(data.address).join(" ")) : "地址取得失敗";
    addressCache[key] = addr;
    return addr;
  }catch(e){
    console.log(e);
    addressCache[key] = "地址取得失敗";
    return "地址取得失敗";
  }
}

/* =========================
   5) 決策燈號：每日 + 原因縮寫
========================= */
function dayDecision(f){
  const maxPop = Math.max(f.popMorning, f.popAfternoon);
  const maxGust = Math.max(f.gustMorning, f.gustAfternoon);

  const badRain = maxPop > DECISION.red_pop;
  const badWind = maxGust > DECISION.red_gust;

  if(badRain || badWind){
    const why = badRain && badWind ? "雨風" : (badRain ? "雨" : "風");
    return { icon:"🔴", label:"不建議", why, level:"red" };
  }

  const midRain = maxPop >= DECISION.yellow_pop && maxPop <= DECISION.red_pop;
  const midWind = maxGust >= DECISION.yellow_gust && maxGust <= DECISION.red_gust;

  if(midRain || midWind){
    const why = midRain && midWind ? "雨風" : (midRain ? "雨" : "風");
    return { icon:"🟡", label:"可打／風大", why, level:"yellow" };
  }

  return { icon:"🟢", label:"適合", why:"", level:"green" };
}

/* =========================
   6) UI：區域按鈕
========================= */
let weatherCache = {};  // name => weather
let addressByCourse = {}; // name => address string
let selectedRegion = "全部";

function createRegionButtons(){
  const regions = ["全部", ...new Set(courses.map(c=>c.region))];
  const container = document.getElementById("regionButtons");
  container.innerHTML = "";

  regions.forEach(r=>{
    const btn = document.createElement("button");
    btn.innerText = r;
    btn.onclick = ()=>filterRegion(r);
    if(r===selectedRegion) btn.classList.add("active");
    container.appendChild(btn);
  });
}

function filterRegion(r){
  selectedRegion = r;
  document.querySelectorAll(".region-buttons button").forEach(btn=>{
    btn.classList.toggle("active", btn.innerText===r);
  });
  renderCourses();
}

/* =========================
   7) 渲染：球場卡片
========================= */
function renderCourses(){
  const container = document.getElementById("courses");
  const filtered = selectedRegion==="全部" ? courses : courses.filter(c=>c.region===selectedRegion);

  const grouped = filtered.reduce((acc,c)=>{
    (acc[c.region] ||= []).push(c);
    return acc;
  },{});

  let html = "";

  for(const region in grouped){
    html += `<div class="region-title">${region}</div>`;

    grouped[region].forEach((course, idx)=>{
      const w = weatherCache[course.name];

      // 地址（可能尚未回來）
      const addr = addressByCourse[course.name];
      const addrClass = !addr ? "addr loading" : (addr==="地址取得失敗" ? "addr bad" : "addr");

      if(!w || w.error){
        html += `
          <div class="card">
            <div class="card-head">
              <div>
                <div class="course-name">${course.name}</div>
                <div class="${addrClass}">地址：${addr ? addr : "載入中..."}</div>
              </div>
            </div>
            <div class="error">天氣讀取失敗</div>
          </div>
        `;
        return;
      }

      // 週燈號條：每一天 + 原因
      const pills = w.forecasts.map((f,i)=>{
        const d = dayDecision(f);
        const short = `${f.date.slice(5).replace("-","/")} ${f.weekday}`;
        const why = d.why ? ` <span class="why"><b>${d.why}</b></span>` : `<span class="why">OK</span>`;
        return `
          <div class="daypill" onclick="scrollToDay('${course.name}', ${i})" title="${short} ${d.label}">
            <span class="dot">${d.icon}</span>
            <span>${short}</span>
            ${why}
          </div>
        `;
      }).join("");

      // 天氣明細（預設2天，其餘隱藏）
      let daysHTML = "";
      w.forecasts.forEach((f,i)=>{
        const hidden = i>=DECISION.default_show_days ? "style='display:none;'" : "";
        const d = dayDecision(f);

        const maxPop = Math.max(f.popMorning,f.popAfternoon);
        const maxGust = Math.max(f.gustMorning,f.gustAfternoon);

        const rainClass = maxPop>DECISION.red_pop ? "rain-high" : "";
        const gustClass = maxGust>DECISION.red_gust ? "gust-high" : (maxGust>=DECISION.yellow_gust ? "wind-high" : "");

        const blockId = `day_${safeId(course.name)}_${i}`;

        daysHTML += `
          <div class="day-block dayitem" id="${blockId}" ${hidden}>
            <div class="day-title">${f.date}（${f.weekday}）</div>

            <div class="row">
              <span>${d.icon} <b>${d.label}</b>${d.why?`（${d.why}）`:""}</span>
              <span>🌧 <span class="${rainClass}">${maxPop}%</span></span>
              <span>💨 <span class="${gustClass}">${maxGust} km/h</span></span>
            </div>

            <div class="row">
              <span>🌡 ${f.minT}°C - ${f.maxT}°C</span>
              <span>體感 ${f.feel0818}°C</span>
            </div>

            <div style="margin-top:6px;">
              08–12｜
              ☔ ${f.rainMorning}mm (${f.popMorning}%)｜
              🌬 ${f.windMorning}km/h｜
              💨 陣風 ${f.gustMorning}<br>
              12–18｜
              ☔ ${f.rainAfternoon}mm (${f.popAfternoon}%)｜
              🌬 ${f.windAfternoon}km/h｜
              💨 陣風 ${f.gustAfternoon}
            </div>
          </div>
        `;
      });

      const cardId = `card_${safeId(course.name)}`;

      html += `
        <div class="card" id="${cardId}">
          <div class="card-head">
            <div>
              <div class="course-name">${course.name}</div>
              <div class="${addrClass}">地址：${addr ? addr : "載入中..."}</div>
            </div>
          </div>

          <div class="weekbar">${pills}</div>

          <div class="days" data-course="${course.name}">
            ${daysHTML}
            <div class="toggle-row">
              <button class="toggle-btn" onclick="toggleDays('${course.name}', this)">展開</button>
            </div>
          </div>
        </div>
      `;
    });
  }

  container.innerHTML = html;
}

function safeId(s){
  return s.replace(/[^\w\u4e00-\u9fa5]/g,'_');
}

/* 展開/收合：保留你原本「前2天」邏輯 */
function toggleDays(courseName, btn){
  const card = btn.closest(".card");
  const items = card.querySelectorAll(".dayitem");
  const isHidden = Array.from(items).slice(DECISION.default_show_days).some(el => el.style.display === "none");

  items.forEach((el, idx)=>{
    if(idx >= DECISION.default_show_days){
      el.style.display = isHidden ? "block" : "none";
    }
  });

  btn.innerText = isHidden ? "收合" : "展開";
}

/* 點週燈號跳到那一天 */
function scrollToDay(courseName, dayIndex){
  const id = `day_${safeId(courseName)}_${dayIndex}`;
  const el = document.getElementById(id);
  if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
}

/* =========================
   8) 載入：分批併發抓天氣，避免手機掛掉
========================= */
async function loadAll(){
  // 先畫區域按鈕
  createRegionButtons();

  // 先顯示「地址載入中 + 天氣載入中」
  document.getElementById("courses").innerHTML = "載入中...";

  // 併發限制：分批抓天氣
  const queue = [...courses];
  while(queue.length){
    const batch = queue.splice(0, DECISION.max_concurrent_fetch);
    await Promise.all(batch.map(async c=>{
      // 天氣
      weatherCache[c.name] = await getWeeklyWeather(c.lat, c.lon);

      // 地址（不阻塞渲染：先渲染再補地址也可以）
      // 但這裡一起抓，避免你覺得「沒顯示地址」
      const addr = await reverseGeocode(c.lat, c.lon);
      addressByCourse[c.name] = addr;
    }));

    // 每批完成就渲染一次（使用者感覺比較順）
    renderCourses();
  }

  // 最終渲染一次
  renderCourses();
}

loadAll();
</script>
