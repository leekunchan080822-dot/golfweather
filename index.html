<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>711 專業氣象系統 V4｜決策模式</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f5f7fa;
  margin:0;
  padding:15px;
}

h2{
  text-align:center;
  margin-bottom:5px;
}

.sub{
  text-align:center;
  font-size:13px;
  color:#666;
  margin-bottom:15px;
}

/* ===== 週決策條 ===== */
.week-bar{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-bottom:15px;
}

.week-dot{
  font-size:20px;
  cursor:pointer;
}

/* ===== 最佳日 ===== */
.best-day{
  background:#111;
  color:#fff;
  padding:10px;
  border-radius:10px;
  text-align:center;
  margin-bottom:15px;
  font-size:14px;
}

/* ===== 卡片 ===== */
.card{
  background:#fff;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.card.best{
  border:2px solid gold;
}

.date{
  font-weight:bold;
  margin-bottom:6px;
}

.status{
  font-size:15px;
  font-weight:bold;
  margin-bottom:6px;
}

.red{color:#e11d48;}
.yellow{color:#d97706;}
.green{color:#16a34a;}

.summary{
  font-size:14px;
  margin-bottom:6px;
}

.detail{
  font-size:13px;
  display:none;
  margin-top:6px;
  border-top:1px solid #eee;
  padding-top:6px;
}

button{
  font-size:12px;
  padding:4px 8px;
  border-radius:6px;
  border:1px solid #ccc;
  background:#f8f8f8;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>711 專業氣象系統 V4</h2>
<div class="sub">決策優先模式｜ECMWF 逐小時資料</div>

<div id="weekBar" class="week-bar"></div>
<div id="bestDay" class="best-day">計算最佳日中...</div>
<div id="cards"></div>

<script>

/* ===== 決策門檻 ===== */
const RULE={
  rainRed:60,
  gustRed:40,
  rainYellow:30,
  gustYellow:30
};

/* ===== 示範球場 ===== */
const course={
  name:"台北高爾夫球場",
  lat:25.0124,
  lon:121.3005
};

function getWeekday(dateStr){
  const d=new Date(dateStr);
  return ["週日","週一","週二","週三","週四","週五","週六"][d.getDay()];
}

/* ===== 決策判定 ===== */
function evaluate(f){
  const maxPop=Math.max(f.popMorning,f.popAfternoon);
  const maxGust=Math.max(f.gustMorning,f.gustAfternoon);

  let reason=[];
  if(maxPop>RULE.rainRed) reason.push("雨");
  if(maxGust>RULE.gustRed) reason.push("風");

  if(reason.length){
    return {level:"red",icon:"🔴",text:"不建議（"+reason.join("＋")+"）"};
  }

  if(maxPop>=RULE.rainYellow || maxGust>=RULE.gustYellow){
    return {level:"yellow",icon:"🟡",text:"風大"};
  }

  return {level:"green",icon:"🟢",text:"適合"};
}

/* ===== API ===== */
async function getWeather(){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${course.lat}&longitude=${course.lon}&hourly=temperature_2m,apparent_temperature,precipitation_probability,precipitation,windspeed_10m,windgusts_10m&daily=temperature_2m_max,temperature_2m_min&forecast_days=7&timezone=Asia/Taipei`;

  const res=await fetch(url);
  const data=await res.json();

  const hourly=data.hourly;
  const daily=data.daily;
  const results=[];

  for(let d=0;d<7;d++){
    const date=daily.time[d];
    const morning=[];
    const afternoon=[];
    const day0818=[];

    hourly.time.forEach((t,i)=>{
      if(t.startsWith(date)){
        const h=parseInt(t.substring(11,13));
        if(h>=8&&h<12) morning.push(i);
        if(h>=12&&h<18) afternoon.push(i);
        if(h>=8&&h<18) day0818.push(i);
      }
    });

    const avg=(arr,key)=>
      arr.length?Math.round(arr.reduce((s,i)=>s+hourly[key][i],0)/arr.length):0;

    results.push({
      date,
      weekday:getWeekday(date),
      minT:daily.temperature_2m_min[d],
      maxT:daily.temperature_2m_max[d],
      popMorning:avg(morning,"precipitation_probability"),
      popAfternoon:avg(afternoon,"precipitation_probability"),
      gustMorning:avg(morning,"windgusts_10m"),
      gustAfternoon:avg(afternoon,"windgusts_10m"),
      rainMorning:avg(morning,"precipitation"),
      rainAfternoon:avg(afternoon,"precipitation"),
      windMorning:avg(morning,"windspeed_10m"),
      windAfternoon:avg(afternoon,"windspeed_10m"),
      feel0818:avg(day0818,"apparent_temperature")
    });
  }

  return results;
}

/* ===== 最佳日 ===== */
function findBest(data){
  return [...data].sort((a,b)=>{
    const ap=Math.max(a.popMorning,a.popAfternoon);
    const bp=Math.max(b.popMorning,b.popAfternoon);
    const ag=Math.max(a.gustMorning,a.gustAfternoon);
    const bg=Math.max(b.gustMorning,b.gustAfternoon);

    const ar=(ap>RULE.rainRed||ag>RULE.gustRed);
    const br=(bp>RULE.rainRed||bg>RULE.gustRed);

    if(ar!==br) return ar?1:-1;
    if(ap!==bp) return ap-bp;
    return ag-bg;
  })[0];
}

/* ===== 渲染 ===== */
function render(data){
  const best=findBest(data);

  const weekBar=document.getElementById("weekBar");
  const bestDiv=document.getElementById("bestDay");
  const cards=document.getElementById("cards");

  weekBar.innerHTML="";
  cards.innerHTML="";

  data.forEach((f,i)=>{
    const d=evaluate(f);

    const dot=document.createElement("div");
    dot.className="week-dot";
    dot.innerText=d.icon;
    dot.onclick=()=>document.getElementById("day"+i).scrollIntoView({behavior:"smooth"});
    weekBar.appendChild(dot);

    const card=document.createElement("div");
    card.className="card";
    if(f.date===best.date) card.classList.add("best");
    card.id="day"+i;

    const maxPop=Math.max(f.popMorning,f.popAfternoon);
    const maxGust=Math.max(f.gustMorning,f.gustAfternoon);

    card.innerHTML=`
      <div class="date">${f.date}（${f.weekday}）</div>
      <div class="status ${d.level}">${d.icon} ${d.text}</div>
      <div class="summary">
        🌧 ${maxPop}% ｜ 💨 ${maxGust} km/h<br>
        🌡 ${f.minT}°C - ${f.maxT}°C
      </div>
      <button onclick="toggleDetail(this)">專業數據</button>
      <div class="detail">
        08–12 ☔ ${f.rainMorning}mm (${f.popMorning}%) ｜ 💨 ${f.gustMorning}<br>
        12–18 ☔ ${f.rainAfternoon}mm (${f.popAfternoon}%) ｜ 💨 ${f.gustAfternoon}<br>
        體感（08–18平均）：${f.feel0818}°C
      </div>
    `;

    cards.appendChild(card);
  });

  bestDiv.innerHTML=`⭐ 本週最佳：${best.date}（${best.weekday}）`;
}

function toggleDetail(btn){
  const d=btn.nextElementSibling;
  d.style.display=d.style.display==="block"?"none":"block";
}

/* ===== 啟動 ===== */
getWeather().then(render);

</script>
</body>
</html>
