/* ===== Google 導航 ===== */
function navigateTo(lat,lon){
 const url=`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
 window.open(url,"_blank");
}

/* ===== 天氣 API（完整 V4 版）===== */
async function getWeeklyWeather(lat,lon){
 const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,apparent_temperature,precipitation_probability,precipitation,windspeed_10m,windgusts_10m&daily=temperature_2m_max,temperature_2m_min&forecast_days=7&timezone=Asia/Taipei`;

 try{
  const res=await fetch(url);
  const data=await res.json();
  if(!data.hourly||!data.daily) return{error:true};

  const hourly=data.hourly;
  const daily=data.daily;
  const results=[];

  for(let d=0;d<7;d++){
   const date=daily.time[d];
   const morning=[];
   const afternoon=[];
   const day0818=[];

   hourly.time.forEach((t,i)=>{
    if(t.startsWith(date)){
     const h=parseInt(t.substring(11,13));
     if(h>=8&&h<12) morning.push(i);
     if(h>=12&&h<18) afternoon.push(i);
     if(h>=8&&h<18) day0818.push(i);
    }
   });

   const avg=(arr,key)=>arr.length?Math.round(arr.reduce((s,i)=>s+hourly[key][i],0)/arr.length):0;

   results.push({
    date,
    weekday:getWeekday(date),
    minT:Math.round(daily.temperature_2m_min[d]*10)/10,
    maxT:Math.round(daily.temperature_2m_max[d]*10)/10,
    feel0818:avg(day0818,"apparent_temperature"),
    popMorning:avg(morning,"precipitation_probability"),
    popAfternoon:avg(afternoon,"precipitation_probability"),
    rainMorning:avg(morning,"precipitation"),
    rainAfternoon:avg(afternoon,"precipitation"),
    windMorning:avg(morning,"windspeed_10m"),
    windAfternoon:avg(afternoon,"windspeed_10m"),
    gustMorning:avg(morning,"windgusts_10m"),
    gustAfternoon:avg(afternoon,"windgusts_10m")
   });
  }

  return{forecasts:results};
 }catch(e){return{error:true};}
}

/* ===== 決策燈號 ===== */
function dayDecision(f){
 const maxPop=Math.max(f.popMorning,f.popAfternoon);
 const maxGust=Math.max(f.gustMorning,f.gustAfternoon);

 if(maxPop>DECISION.red_pop||maxGust>DECISION.red_gust)
  return{icon:"🔴",label:"不建議"};

 if(maxPop>=DECISION.yellow_pop||maxGust>=DECISION.yellow_gust)
  return{icon:"🟡",label:"可打／風大"};

 return{icon:"🟢",label:"適合"};
}

let weatherCache={};
let selectedRegion="全部";

/* ===== 區域按鈕 ===== */
function createRegionButtons(){
 const regions=["全部",...new Set(courses.map(c=>c.region))];
 const container=document.getElementById("regionButtons");
 container.innerHTML="";
 regions.forEach(r=>{
  const btn=document.createElement("button");
  btn.innerText=r;
  btn.onclick=()=>{selectedRegion=r;renderCourses();createRegionButtons();};
  if(r===selectedRegion) btn.classList.add("active");
  container.appendChild(btn);
 });
}

/* ===== 渲染 ===== */
function renderCourses(){
 const container=document.getElementById("courses");

 // 先區域過濾
 let filtered = selectedRegion==="全部"
  ? courses
  : courses.filter(c=>c.region===selectedRegion);

 // 再搜尋過濾（名稱 / 地址 / 區域）
 if(searchKeyword){
  filtered = filtered.filter(c =>
   c.name.toLowerCase().includes(searchKeyword) ||
   c.address.toLowerCase().includes(searchKeyword) ||
   c.region.toLowerCase().includes(searchKeyword)
  );
 }

 let html="";

 filtered.forEach(course=>{
  const w=weatherCache[course.name];

  if(!w||w.error){
   html+=`
   <div class="card">
    <div class="card-head">
     <div>
      <div class="course-name">
       ${course.name}
       <button class="nav-btn" onclick="navigateTo(${course.lat},${course.lon})">導航</button>
      </div>
      <div class="addr">地址：${course.address}</div>
     </div>
    </div>
    <div class="error">天氣讀取中...</div>
   </div>`;
   return;
  }

  const pills=w.forecasts.map(f=>{
   const d=dayDecision(f);
   return `<div class="daypill"><span class="dot">${d.icon}</span>${f.date.slice(5)} ${f.weekday}</div>`;
  }).join("");

  let daysHTML="";
  w.forecasts.forEach((f,i)=>{
   const hidden=i>=DECISION.default_show_days?"style='display:none;'":"";
   const d=dayDecision(f);
   const maxPop=Math.max(f.popMorning,f.popAfternoon);
   const maxGust=Math.max(f.gustMorning,f.gustAfternoon);

   daysHTML+=`
   <div class="day-block dayitem" ${hidden}>
    <div class="day-title">${f.date}（${f.weekday}）</div>
    <div class="row">
     <span>${d.icon} <b>${d.label}</b></span>
     <span>🌧 ${maxPop}%</span>
     <span>💨 ${maxGust} km/h</span>
    </div>
    <div class="row">
     <span>🌡 ${f.minT}°C - ${f.maxT}°C</span>
     <span>體感 ${f.feel0818}°C</span>
    </div>
   </div>`;
  });

  html+=`
  <div class="card">
   <div class="card-head">
    <div>
     <div class="course-name">
      ${course.name}
      <button class="nav-btn" onclick="navigateTo(${course.lat},${course.lon})">導航</button>
     </div>
     <div class="addr">地址：${course.address}</div>
    </div>
   </div>
   <div class="weekbar">${pills}</div>
   <div class="days">
    ${daysHTML}
    <div class="toggle-row">
     <button class="toggle-btn" onclick="toggleDays(this)">展開一周詳細天氣</button>
    </div>
   </div>
  </div>`;
 });

 container.innerHTML=html;
}

function toggleDays(btn){
 const card=btn.closest(".card");
 const items=card.querySelectorAll(".dayitem");
 const hidden=Array.from(items).slice(DECISION.default_show_days).some(el=>el.style.display==="none");
 items.forEach((el,i)=>{
  if(i>=DECISION.default_show_days)
   el.style.display=hidden?"block":"none";
 });
 btn.innerText=hidden?"收合":"展開一周詳細天氣";
}
/* ===== 載入 ===== */
async function loadAll(){
 createRegionButtons();
 document.getElementById("courses").innerHTML="載入中...";

 const promises = courses.map(c =>
  getWeeklyWeather(c.lat,c.lon).then(data=>{
   weatherCache[c.name]=data;
  })
 );

 await Promise.all(promises);

 renderCourses();
}

loadAll();
</script>
