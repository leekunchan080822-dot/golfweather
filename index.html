/* ===== GCI 真實模型 ===== */
function calculateGCI(pop,rain,temp){
 let score=100;

 if(rain<=0.1) score-=0;
 else if(rain<=0.5) score-=8;
 else if(rain<=1) score-=18;
 else if(rain<=2) score-=35;
 else score-=60;

 if(pop<=20) score-=0;
 else if(pop<=40) score-=5;
 else if(pop<=60) score-=12;
 else if(pop<=80) score-=22;
 else score-=35;

 let tempPenalty=0;
 if(temp>=26) tempPenalty=0;
 else if(temp>=22) tempPenalty=2;
 else if(temp>=20) tempPenalty=5;
 else if(temp>=18) tempPenalty=10;
 else if(temp>=16) tempPenalty=18;
 else tempPenalty=30;

 if(rain<0.2) tempPenalty*=0.5;
 score-=tempPenalty;

 return Math.max(0,Math.min(100,Math.round(score)));
}

function gciLight(score){
 if(score>=75) return {cls:"green",icon:"🟢"};
 if(score>=50) return {cls:"yellow",icon:"🟡"};
 return {cls:"red",icon:"🔴"};
}

function reasonText(pop,rain,temp){
 let r=[];
 if(rain<0.2) r.push("低雨量");
 else if(rain<1) r.push("小雨");
 else r.push("雨量偏高");

 if(pop<30) r.push("低降雨機率");
 else if(pop<60) r.push("降雨中等");
 else r.push("降雨偏高");

 if(temp>=24) r.push("體感溫暖");
 else if(temp>=20) r.push("體感舒適");
 else r.push("偏涼");

 return r.slice(0,3);
}

/* ===== 排序規則 ===== */
function rankSort(a,b){
 if(b.score!==a.score) return b.score-a.score;
 if(a.rain!==b.rain) return a.rain-b.rain;
 if(a.pop!==b.pop) return a.pop-b.pop;
 return b.temp-a.temp;
}

function navigateTo(lat,lon){
 window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`,"_blank");
}

/* ===== API ===== */
async function fetchWeather(lat,lon){
 try{
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=precipitation,precipitation_probability,apparent_temperature&timezone=Asia%2FTaipei&forecast_days=7`;

  const res = await fetch(url);
  return await res.json();
 }catch(e){
  console.error("API錯誤",e);
  return {};
 }
}

let weatherCache={};
let rankingData={};
let selectedRegion="全部";

/* ===== 區域按鈕 ===== */
function createRegionButtons(){
 const regions=["全部",...new Set(courses.map(c=>c.region))];
 const container=document.getElementById("regionButtons");
 container.innerHTML="";
 regions.forEach(r=>{
  const btn=document.createElement("button");
  btn.innerText=r;
  btn.onclick=()=>{selectedRegion=r;createRegionButtons();renderCourses();};
  if(r===selectedRegion) btn.classList.add("active");
  container.appendChild(btn);
 });
}

/* ===== 建立 Ranking ===== */
function buildRanking(){

 rankingData={};

 courses.forEach(course=>{
  const w=weatherCache[course.name];
  if(!w) return;

  w.forEach(day=>{
   if(!rankingData[day.date]) rankingData[day.date]={};

   if(!rankingData[day.date][course.region])
     rankingData[day.date][course.region]={morning:[],afternoon:[]};

   rankingData[day.date][course.region].morning.push({
     name:course.name,
     score:day.morningScore,
     rain:day.rainMorning,
     pop:day.popMorning,
     temp:day.tempMorning,
     reasons:reasonText(day.popMorning,day.rainMorning,day.tempMorning)
   });

   rankingData[day.date][course.region].afternoon.push({
     name:course.name,
     score:day.afternoonScore,
     rain:day.rainAfternoon,
     pop:day.popAfternoon,
     temp:day.tempAfternoon,
     reasons:reasonText(day.popAfternoon,day.rainAfternoon,day.tempAfternoon)
   });
  });
 });

 // 排序
 Object.keys(rankingData).forEach(date=>{
  Object.keys(rankingData[date]).forEach(region=>{
   rankingData[date][region].morning.sort(rankSort);
   rankingData[date][region].afternoon.sort(rankSort);
  });
 });
}

/* ===== Render 決策中心 ===== */
function renderDecisionCenter(){
 const container=document.getElementById("decisionCenter");
 let html="";

 Object.keys(rankingData).forEach(date=>{
  html+=`<div class="rank-day">
   <div class="rank-title">📅 ${date}</div>`;

  Object.keys(rankingData[date]).forEach(region=>{
   html+=`<div class="rank-region">📍 ${region}</div>`;

   html+=`<div class="rank-item">🏌️ 早球 Top5</div>`;
   rankingData[date][region].morning.slice(0,5).forEach((c,i)=>{
    html+=`<div class="rank-item">${i+1}. ${c.name} – ${c.score}分</div>`;
    c.reasons.forEach(r=>{
      html+=`<div class="rank-reason">✔ ${r}</div>`;
    });
   });

   html+=`<div class="rank-item">🏌️ 午球 Top5</div>`;
   rankingData[date][region].afternoon.slice(0,5).forEach((c,i)=>{
    html+=`<div class="rank-item">${i+1}. ${c.name} – ${c.score}分</div>`;
    c.reasons.forEach(r=>{
      html+=`<div class="rank-reason">✔ ${r}</div>`;
    });
   });
  });

  html+=`</div>`;
 });

 container.innerHTML=html;
}

/* ===== Render 球場卡片 ===== */
function renderCourses(){

 const container=document.getElementById("courses");

 let filtered = courses.filter(c=>{
 const matchRegion = selectedRegion==="全部" || c.region===selectedRegion;
 const matchSearch = !searchKeyword ||
  c.name.toLowerCase().includes(searchKeyword) ||
  c.address.toLowerCase().includes(searchKeyword) ||
  c.region.toLowerCase().includes(searchKeyword);

 return matchRegion && matchSearch;
});

 if(filtered.length===0){
  container.innerHTML="<div class='card'>找不到符合條件的球場</div>";
  return;
 }

 let html="";

 filtered.forEach(course=>{
  const w=weatherCache[course.name];

  if(!w){
   html+=`<div class="card"><div class="course-name">${course.name}</div><div class="loading"><span class="spinner"></span>讀取天氣中...</div></div>`;
   return;
  }

  html+=`<div class="card">
  <div class="course-name">${course.name}
  <button class="nav-btn" onclick="navigateTo(${course.lat},${course.lon})">導航</button>
  </div>
  <div class="addr">${course.address}</div>`;

  w.forEach((f,i)=>{
   const hidden=i>=DECISION.default_show_days?"style='display:none;'":"";

   html+=`<div class="day-block dayitem" ${hidden}>
   <div class="day-title">${f.date}（${f.weekday}）</div>

   <div class="period-box">

   <div class="period ${f.morning.cls}">
   <div class="period-title">08–12 ${f.morning.icon} (${f.morningScore}分)</div>
   🌧 ${f.popMorning}% (${f.rainMorning}mm)<br>
   🌡 體感 ${f.tempMorning}°C
   </div>

   <div class="period ${f.afternoon.cls}">
   <div class="period-title">12–18 ${f.afternoon.icon} (${f.afternoonScore}分)</div>
   🌧 ${f.popAfternoon}% (${f.rainAfternoon}mm)<br>
   🌡 體感 ${f.tempAfternoon}°C
   </div>

   </div>
   </div>`;
  });

  html+=`<button class="toggle-btn" onclick="toggleDays(this)">展開一周</button></div>`;
 });

 container.innerHTML=html;
}

/* ===== 展開收合 ===== */
function toggleDays(btn){
 const card=btn.closest(".card");
 const items=card.querySelectorAll(".dayitem");
 const hidden=Array.from(items).slice(DECISION.default_show_days).some(el=>el.style.display==="none");
 items.forEach((el,i)=>{
  if(i>=DECISION.default_show_days)
   el.style.display=hidden?"block":"none";
 });
 btn.innerText=hidden?"收合":"展開一周";
}

/* ===== 載入 ===== */
async function loadAll(){

 createRegionButtons();

 const queue=[...courses];
 const workers=[];

 for(let i=0;i<DECISION.max_concurrent_fetch;i++){
  workers.push((async()=>{
   while(queue.length){
    const c=queue.shift();
    const data=await fetchWeather(c.lat,c.lon);

    if(data.hourly){
     weatherCache[c.name]=[];

     const dates=[...new Set(data.hourly.time.map(t=>t.substring(0,10)))];

for(let d=0;d<dates.length;d++){
 const date=dates[d];
      const morningIndex=data.hourly.time.map((t,i)=>{
       const h=parseInt(t.substring(11,13));
       return t.startsWith(date)&&h>=8&&h<12?i:null;
      }).filter(i=>i!==null);

      const afternoonIndex=data.hourly.time.map((t,i)=>{
       const h=parseInt(t.substring(11,13));
       return t.startsWith(date)&&h>=12&&h<18?i:null;
      }).filter(i=>i!==null);

      const avg=(arr,key)=>arr.length?Math.round(arr.reduce((s,i)=>s+data.hourly[key][i],0)/arr.length):0;

      const popMorning=avg(morningIndex,"precipitation_probability");
      const rainMorning=avg(morningIndex,"precipitation");
      const tempMorning=avg(morningIndex,"apparent_temperature");

      const popAfternoon=avg(afternoonIndex,"precipitation_probability");
      const rainAfternoon=avg(afternoonIndex,"precipitation");
      const tempAfternoon=avg(afternoonIndex,"apparent_temperature");

      const morningScore=calculateGCI(popMorning,rainMorning,tempMorning);
      const afternoonScore=calculateGCI(popAfternoon,rainAfternoon,tempAfternoon);

      weatherCache[c.name].push({
       date,
       weekday:getWeekday(date),
       popMorning,rainMorning,tempMorning,
       popAfternoon,rainAfternoon,tempAfternoon,
       morningScore,afternoonScore,
       morning:gciLight(morningScore),
       afternoon:gciLight(afternoonScore)
      });
     }
    }

    renderCourses();
   }
  })());
 }

 await Promise.all(workers);

 buildRanking();
 renderDecisionCenter();
}

loadAll();

</script>
