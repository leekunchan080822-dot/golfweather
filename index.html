<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>711 專業氣象系統 V3｜全台高爾夫球場儀表板（ECMWF）</title>

<style>
body { font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f7fa;margin:0;padding:15px;}
.header-info{text-align:center;font-size:14px;color:#555;}
h2{text-align:center;margin:10px 0;}
.region-buttons{text-align:center;margin:15px 0;}
.region-buttons button{margin:4px;padding:6px 12px;border-radius:20px;border:1px solid #ccc;background:white;cursor:pointer;font-size:13px;}
.region-buttons button.active{background:#111;color:white;border-color:#111;}
.region-title{font-size:18px;font-weight:bold;margin:25px 0 10px;}
.card{background:white;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 3px 10px rgba(0,0,0,0.08);}
.day-block{font-size:13px;margin-top:6px;padding-top:6px;border-top:1px solid #eee;}
.rain-high{color:red;font-weight:bold;}
.wind-high{color:#d97706;font-weight:bold;}
.gust-high{color:#b91c1c;font-weight:bold;}
.error{color:red;}
.toggle-btn{font-size:12px;padding:4px 8px;border-radius:6px;border:1px solid #ccc;background:#f8f8f8;cursor:pointer;}
small{color:#777;}

/* ===== V3 Dashboard ===== */
.dashboard-wrap{
  background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}
.d-title{font-size:16px;font-weight:700; text-align:center; margin:4px 0 6px;}
.d-sub{font-size:13px;color:#666;text-align:center;margin:0 0 8px;}
.d-row{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;font-size:12px;color:#444;}
.d-chip{background:#f3f4f6;border:1px solid #e5e7eb;border-radius:999px;padding:4px 10px;display:inline-flex;gap:6px;align-items:center;}
.d-best{margin-top:10px;background:#111;color:#fff;border-radius:10px;padding:10px;text-align:center;font-size:14px;}
.d-actions{margin-top:10px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}
.d-actions button{font-size:12px;padding:6px 10px;border-radius:999px;border:1px solid #ccc;background:#fff;cursor:pointer;}
.d-actions button.active{background:#111;color:#fff;border-color:#111;}
.criteria{margin-top:10px;font-size:12px;color:#555;display:none;line-height:1.6;}
.criteria .line{display:flex;gap:8px;align-items:flex-start;margin:4px 0;}
.criteria .k{min-width:72px;font-weight:700;}
.criteria .v{flex:1;}
</style>
</head>

<body>

<!-- ===== V3 Dashboard Header ===== -->
<div class="dashboard-wrap">
  <div class="d-title">711 專業氣象系統 V3</div>
  <div class="d-sub">全台高爾夫球場 7 日精準預報儀表板（ECMWF）</div>

  <div class="d-row">
    <span class="d-chip">🕒 <span id="dateInfo"></span></span>
    <span class="d-chip">📡 Data Engine：Open-Meteo ECMWF（逐小時格點）</span>
    <span class="d-chip">⚙ Decision Engine：雨機率 × 陣風（溫度/體感僅參考）</span>
  </div>

  <div class="d-best" id="bestDayBar">計算本週最佳打球日中...</div>

  <div class="d-actions">
    <button class="active" id="langZhBtn" onclick="setLang('zh')">中文</button>
    <button id="langEnBtn" onclick="setLang('en')">EN</button>
    <button onclick="toggleCriteria()" id="criteriaBtn">決策基準</button>
  </div>

  <div class="criteria" id="criteriaBox">
    <div class="line"><div class="k">🔴 不建議</div><div class="v">降雨機率 &gt; 60% 或 陣風 &gt; 40 km/h</div></div>
    <div class="line"><div class="k">🟡 可打/風大</div><div class="v">降雨 30–60% 或 陣風 30–40 km/h</div></div>
    <div class="line"><div class="k">🟢 適合</div><div class="v">降雨 &lt; 30% 且 陣風 &lt; 30 km/h</div></div>
    <div class="line"><div class="k">備註</div><div class="v">溫度與體感僅供舒適度參考，不納入燈號判定</div></div>
  </div>
</div>

<div class="region-buttons" id="regionButtons"></div>
<div id="courses">載入中...</div>

<script>
/* ===== 日期 ===== */
const today = new Date();
document.getElementById("dateInfo").innerText = "更新時間：" + today.toLocaleString();

/* ===== 語言切換（先做 UI，不影響資料） ===== */
let LANG="zh";
function setLang(lang){
  LANG=lang;
  document.getElementById("langZhBtn").classList.toggle("active", lang==="zh");
  document.getElementById("langEnBtn").classList.toggle("active", lang==="en");
  // 你要做完整中英切換時，再把字串抽出去即可；目前先保留中文顯示（不破壞原功能）
}
function toggleCriteria(){
  const box=document.getElementById("criteriaBox");
  const btn=document.getElementById("criteriaBtn");
  const open = box.style.display==="block";
  box.style.display = open ? "none" : "block";
  btn.innerText = open ? "決策基準" : "收合基準";
}

/* ===== 星期 ===== */
function getWeekday(dateStr){
  const d=new Date(dateStr);
  const arr=["週日","週一","週二","週三","週四","週五","週六"];
  return arr[d.getDay()];
}

/* ===== V3 Decision Engine ===== */
const DECISION_RULE = {
  rainRed: 60,
  gustRed: 40,
  rainYellow: 30,
  gustYellow: 30
};

function evaluateDay(f){
  const maxPop = Math.max(f.popMorning, f.popAfternoon);
  const maxGust = Math.max(f.gustMorning, f.gustAfternoon);

  if(maxPop > DECISION_RULE.rainRed || maxGust > DECISION_RULE.gustRed){
    return {level:"red", icon:"🔴", label:"不建議"};
  }
  if(maxPop >= DECISION_RULE.rainYellow || maxGust >= DECISION_RULE.gustYellow){
    return {level:"yellow", icon:"🟡", label:(maxGust >= DECISION_RULE.gustYellow ? "風大" : "可打")};
  }
  return {level:"green", icon:"🟢", label:"適合"};
}

/* ===== 全台高爾夫球場清單（示範：你把 address 補齊即可） =====
   注意：不再顯示座標，但 lat/lon 仍保留用來抓天氣
*/
const courses = [

/* 台北 / 新北 */
{ region:"台北市 / 新北市", name:"翡翠高爾夫球場", address:"（請填入正確地址）", lat:25.0679, lon:121.4543 },
{ region:"台北市 / 新北市", name:"黃金海岸（北海）高爾夫球場", address:"（請填入正確地址）", lat:25.2901, lon:121.5378 },

/* 桃園 */
{ region:"桃園", name:"台北高爾夫球場", address:"（請填入正確地址）", lat:25.0124, lon:121.3005 },
{ region:"桃園", name:"統帥高爾夫球場", address:"（請填入正確地址）", lat:24.9967, lon:121.2831 },

/* 新竹 / 苗栗 */
{ region:"新竹 / 苗栗", name:"山溪地高爾夫球場", address:"（請填入正確地址）", lat:24.4845, lon:120.9027 }

  /* 你原本完整清單請在此照格式貼回去（每筆多加 address:"..."） */
];

/* ===== 精準 ECMWF API（新增體感 apparent_temperature） ===== */
async function getWeeklyWeather(lat,lon){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,apparent_temperature,precipitation_probability,precipitation,windspeed_10m,windgusts_10m&daily=temperature_2m_max,temperature_2m_min&forecast_days=7&timezone=Asia/Taipei`;

  try{
    const res=await fetch(url);
    const data=await res.json();

    const hourly=data.hourly;
    const daily=data.daily;

    const results=[];

    for(let d=0;d<7;d++){
      const date=daily.time[d];
      const morning=[];
      const afternoon=[];
      const day0818=[]; // 08–18 用於體感平均（不納入決策）

      hourly.time.forEach((t,i)=>{
        if(t.startsWith(date)){
          const h=parseInt(t.substring(11,13));
          if(h>=8&&h<12) morning.push(i);
          if(h>=12&&h<18) afternoon.push(i);
          if(h>=8&&h<18) day0818.push(i);
        }
      });

      const avg=(arr,key)=>
        arr.length?Math.round(arr.reduce((s,i)=>s+hourly[key][i],0)/arr.length):0;

      results.push({
        date,
        weekday:getWeekday(date),
        minT:daily.temperature_2m_min[d],
        maxT:daily.temperature_2m_max[d],

        popMorning:avg(morning,"precipitation_probability"),
        popAfternoon:avg(afternoon,"precipitation_probability"),

        rainMorning:avg(morning,"precipitation"),
        rainAfternoon:avg(afternoon,"precipitation"),

        windMorning:avg(morning,"windspeed_10m"),
        windAfternoon:avg(afternoon,"windspeed_10m"),

        gustMorning:avg(morning,"windgusts_10m"),
        gustAfternoon:avg(afternoon,"windgusts_10m"),

        feel0818:avg(day0818,"apparent_temperature")
      });
    }

    return {forecasts:results};

  }catch(e){
    console.log(e);
    return {error:true};
  }
}

/* ===== UI 控制 ===== */
let weatherCache={};

function createRegionButtons(){
  const regions=["全部",...new Set(courses.map(c=>c.region))];
  const container=document.getElementById("regionButtons");
  container.innerHTML="";
  regions.forEach(r=>{
    const btn=document.createElement("button");
    btn.innerText=r;
    btn.onclick=()=>filterRegion(r);
    container.appendChild(btn);
  });
  container.firstChild.classList.add("active");
}

function filterRegion(selected){
  document.querySelectorAll(".region-buttons button").forEach(btn=>{
    btn.classList.toggle("active",btn.innerText===selected);
  });
  renderCourses(selected);
}

/* ===== 本週最佳打球日（全站平均） =====
   規則：用全站每一天的「maxPop + maxGust」平均做排序；排除整體偏紅的日子不做硬排除（避免全紅沒結果）
*/
function computeGlobalBestDay(){
  // 收集 7 天日期索引（假設所有球場 forecasts 都是同樣日期序列）
  const entries = Object.values(weatherCache).filter(x=>x && !x.error && x.forecasts);
  if(entries.length===0) return null;

  const days = entries[0].forecasts.map(f=>({date:f.date, weekday:f.weekday}));

  const scores = days.map((d,idx)=>{
    let sumPop=0, sumGust=0, count=0;

    entries.forEach(e=>{
      const f=e.forecasts[idx];
      if(!f) return;
      const maxPop=Math.max(f.popMorning,f.popAfternoon);
      const maxGust=Math.max(f.gustMorning,f.gustAfternoon);
      sumPop += maxPop;
      sumGust += maxGust;
      count += 1;
    });

    const avgPop = count ? Math.round(sumPop/count) : 999;
    const avgGust = count ? Math.round(sumGust/count) : 999;

    return { ...d, avgPop, avgGust };
  });

  // 先偏好非紅（平均門檻）再比 avgPop，再比 avgGust
  const isAvgRed = (x)=> (x.avgPop > DECISION_RULE.rainRed || x.avgGust > DECISION_RULE.gustRed);

  scores.sort((a,b)=>{
    const ar=isAvgRed(a), br=isAvgRed(b);
    if(ar!==br) return ar ? 1 : -1; // 非紅優先
    if(a.avgPop!==b.avgPop) return a.avgPop - b.avgPop;
    return a.avgGust - b.avgGust;
  });

  return scores[0] || null;
}

/* ===== 載入 ===== */
async function loadCourses(){
  await Promise.all(
    courses.map(async c=>{
      weatherCache[c.name]=await getWeeklyWeather(c.lat,c.lon);
    })
  );

  // 計算最佳打球日
  const best = computeGlobalBestDay();
  const bestBar=document.getElementById("bestDayBar");
  if(best){
    bestBar.innerText = `📌 本週最佳打球日（全站平均）：${best.date}（${best.weekday}）｜🌧 ${best.avgPop}% ｜ 💨 ${best.avgGust} km/h`;
  }else{
    bestBar.innerText = `📌 本週最佳打球日：無法計算（資料不足）`;
  }

  createRegionButtons();
  renderCourses("全部");
}

/* ===== 渲染 ===== */
function renderCourses(filter="全部"){
  let html="";

  const filtered=filter==="全部"?courses:courses.filter(c=>c.region===filter);

  const grouped=filtered.reduce((acc,c)=>{
    if(!acc[c.region]) acc[c.region]=[];
    acc[c.region].push(c);
    return acc;
  },{});

  for(const region in grouped){
    html+=`<div class="region-title">${region}</div>`;

    grouped[region].forEach((course,index)=>{
      const w=weatherCache[course.name];

      if(!w||w.error){
        html+=`<div class="card"><strong>${course.name}</strong><div class="error">讀取失敗</div></div>`;
        return;
      }

      const cardId=`card_${region}_${index}`.replace(/\s/g,'');

      let forecastHTML="";

      w.forecasts.forEach((f,i)=>{
        const hidden=i>=2?"display:none;":"";

        const rainClassMorning=f.rainMorning>=0.5?"rain-high":"";
        const rainClassAfternoon=f.rainAfternoon>=0.5?"rain-high":"";

        const windClassMorning=f.windMorning>=25?"wind-high":"";
        const windClassAfternoon=f.windAfternoon>=25?"wind-high":"";

        const gustClassMorning=f.gustMorning>=35?"gust-high":"";
        const gustClassAfternoon=f.gustAfternoon>=35?"gust-high":"";

        // V3 Decision Summary
        const d = evaluateDay(f);
        const maxPop = Math.max(f.popMorning, f.popAfternoon);
        const maxGust = Math.max(f.gustMorning, f.gustAfternoon);

        forecastHTML+=`
        <div class="day-block extra-day" style="${hidden}">
          <strong>${f.date}（${f.weekday}）</strong>
          <div style="margin-top:4px;">
            ${d.icon} ${d.label}<br>
            🌧 降雨 ${maxPop}% ｜ 💨 陣風 ${maxGust} km/h<br>
            🌡 溫度 ${f.minT}°C - ${f.maxT}°C ｜ 體感 ${f.feel0818}°C
          </div>

          <div style="margin-top:6px;">
            08–12｜
            ☔ <span class="${rainClassMorning}">${f.rainMorning}mm (${f.popMorning}%)</span>｜
            🌬 <span class="${windClassMorning}">${f.windMorning}km/h</span>｜
            💨 <span class="${gustClassMorning}">陣風 ${f.gustMorning}</span><br>

            12–18｜
            ☔ <span class="${rainClassAfternoon}">${f.rainAfternoon}mm (${f.popAfternoon}%)</span>｜
            🌬 <span class="${windClassAfternoon}">${f.windAfternoon}km/h</span>｜
            💨 <span class="${gustClassAfternoon}">陣風 ${f.gustAfternoon}</span>
          </div>
        </div>`;
      });

      forecastHTML+=`
      <div style="text-align:right;margin-top:6px;">
        <button class="toggle-btn" onclick="toggleForecast('${cardId}',this)">展開</button>
      </div>`;

      // 地址顯示（不顯示座標）
      const addr = course.address && course.address.trim() ? course.address : "（尚未設定地址）";

      html+=`
      <div class="card" id="${cardId}">
        <strong>${course.name}</strong><br>
        <small>地址：${addr}</small>
        ${forecastHTML}
      </div>`;
    });
  }

  document.getElementById("courses").innerHTML=html;
}

/* ===== 展開收合（保留你原本邏輯：預設顯示前 2 天） ===== */
function toggleForecast(cardId,btn){
  const card=document.getElementById(cardId);
  const extra=card.querySelectorAll(".extra-day");
  const hidden=extra[2]?.style.display==="none";
  extra.forEach((d,i)=>{
    if(i>=2) d.style.display=hidden?"block":"none";
  });
  btn.innerText=hidden?"收合":"展開";
}

loadCourses();
</script>
</body>
</html>
